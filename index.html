<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO and Recruiter conversion titles -->
    <title>Khalid Mohamed | Backend & Full-Stack Systems Engineer</title>
    <meta name="description" content="Portfolio of Khalid Mohamed, Computer Science & AI student specializing in backend architectures, gRPC APIs, distributed systems, Docker, Redis caching, and real-time platforms." />
    
    <!-- OpenGraph meta tags for social share readability -->
    <meta property="og:title" content="Khalid Mohamed | Backend & Full-Stack Systems Engineer" />
    <meta property="og:description" content="Specializing in scalable distributed APIs, outbox event relays, and low-latency databases." />
    <meta property="og:type" content="website" />
    
    <!-- Accessibility support -->
    <meta name="theme-color" content="#09090b" />
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        if (saved ? saved === 'dark' : true) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-zinc-50 dark:bg-[#09090b] transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
